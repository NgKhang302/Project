spring.application.name=news

jwt.secret=${JWT_SECRET:songnhip24_news_secret_key_must_be_at_least_32_chars}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/songnhip24_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
#Thư viện Java để "nói chuyện" với PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

#Khi khởi động app, chỉ kiểm tra schema DB có khớp với Entity không — KHÔNG tự sửa. Nếu sai → lỗi ngay
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

# Upload ảnh tối đa 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger UI tại /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
