services:
  db:
    image: postgres:16-alpine
    container_name: songnhip24-db
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: songnhip24-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/newsdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JWT_SECRET: change-this-secret-in-production-must-be-long-enough
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: songnhip24-frontend
    volumes:
      - uploads:/usr/share/nginx/html/uploads
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
  uploads:
