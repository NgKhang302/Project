services:
  # Backend — Spring Boot
  - type: web
    name: songnhip24-backend
    runtime: java
    rootDir: du-an-web-tin-tuc/backend
    buildCommand: mvn package -DskipTests
    startCommand: java -jar target/news-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend — Static Site
  - type: web
    name: songnhip24-frontend
    runtime: static
    rootDir: du-an-web-tin-tuc/frontend
    buildCommand: ""
    staticPublishPath: .
