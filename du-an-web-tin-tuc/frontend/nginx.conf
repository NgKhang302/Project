server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://backend:8080;
    }
}
