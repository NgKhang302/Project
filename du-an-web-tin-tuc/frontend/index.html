<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trang chủ – SongNhip24</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav>
  <a class="logo" href="index.html">SongNhip24</a>
  <div class="nav-links">
    <a href="index.html">Trang chủ</a>
    <span id="cat-nav"></span>
    <a href="admin/index.html">Admin</a>
  </div>
</nav>

<div class="container">

  <!-- HERO -->
  <section id="hero-section" style="display:none">
    <div id="hero"></div>
  </section>

  <!-- BÀI MỚI NHẤT -->
  <section class="section-block">
    <h2 class="section-title">Bài mới nhất</h2>
    <div id="article-grid" class="article-grid">
      <p class="loading">Đang tải...</p>
    </div>
  </section>

  <!-- CATEGORY SECTIONS -->
  <div id="category-sections"></div>

  <!-- NEWSLETTER -->
  <div class="newsletter-box">
    <h3>Nhận bản tin mỗi tuần</h3>
    <p>Cập nhật tin công nghệ, AI, việc làm ngay trong hộp thư của bạn.</p>
    <div id="newsletter-alert" style="display:none"></div>
    <form id="newsletter-form" class="newsletter-form">
      <input type="email" id="newsletter-email" placeholder="email@example.com" required />
      <button type="submit" class="btn btn-primary">Đăng ký</button>
    </form>
  </div>

</div>

<script src="js/api.js"></script>
<script>
  async function loadCategories() {
    try {
      const cats = await getPublicCategories();
      document.getElementById('cat-nav').innerHTML = cats.map(c =>
        `<a href="category.html?slug=${c.slug}">${c.name}</a>`
      ).join('');
      return cats;
    } catch (e) { return []; }
  }

  async function loadHeroAndArticles() {
    const grid = document.getElementById('article-grid');
    try {
      const articles = await getPublishedArticles();
      if (articles.length === 0) {
        grid.innerHTML = '<p class="empty">Chưa có bài viết nào.</p>';
        return;
      }

      // Hero = bài đầu tiên
      const hero = articles[0];
      document.getElementById('hero-section').style.display = 'block';
      document.getElementById('hero').innerHTML = `
        <div class="hero-card" onclick="location.href='article.html?slug=${hero.slug}'">
          <div class="hero-img">
            ${hero.coverImageUrl
              ? `<img src="http://localhost:8080${hero.coverImageUrl}" alt="${hero.title}" />`
              : `<div class="hero-no-img">📰</div>`}
            <div class="hero-overlay"></div>
          </div>
          <div class="hero-body">
            <span class="card-category">${hero.categoryName}</span>
            <h1 class="hero-title">${hero.title}</h1>
            <p class="hero-summary">${hero.summary || ''}</p>
            <div class="card-meta">${formatDate(hero.publishedAt)} · ${hero.createdBy} · 👁 ${hero.viewCount}</div>
          </div>
        </div>
      `;

      // Grid = 6 bài tiếp theo (bỏ qua bài hero)
      const rest = articles.slice(1, 7);
      if (rest.length === 0) {
        grid.innerHTML = '<p class="empty">Chưa có bài viết nào khác.</p>';
        return;
      }
      grid.innerHTML = rest.map(a => `
        <div class="card" onclick="location.href='article.html?slug=${a.slug}'">
          ${a.coverImageUrl
            ? `<img src="http://localhost:8080${a.coverImageUrl}" alt="${a.title}" />`
            : `<div class="card-no-img">📰</div>`}
          <div class="card-body">
            <div class="card-category">${a.categoryName}</div>
            <div class="card-title">${a.title}</div>
            <div class="card-summary">${a.summary || ''}</div>
            <div class="card-meta">${formatDate(a.publishedAt)} · ${a.createdBy} · 👁 ${a.viewCount}</div>
          </div>
        </div>
      `).join('');
    } catch (e) {
      grid.innerHTML = '<p class="empty">Không thể tải bài viết.</p>';
    }
  }

  async function loadCategorySections(cats) {
    const container = document.getElementById('category-sections');
    if (!cats || cats.length === 0) return;

    // Lấy tối đa 3 category đầu
    const topCats = cats.slice(0, 3);

    for (const cat of topCats) {
      try {
        const articles = await getArticlesByCategory(cat.slug);
        if (articles.length === 0) continue;

        const section = document.createElement('section');
        section.className = 'section-block';
        section.innerHTML = `
          <h2 class="section-title">
            ${cat.name}
            <a href="category.html?slug=${cat.slug}" class="section-more">Xem tất cả →</a>
          </h2>
          <div class="article-grid">
            ${articles.slice(0, 3).map(a => `
              <div class="card" onclick="location.href='article.html?slug=${a.slug}'">
                ${a.coverImageUrl
                  ? `<img src="http://localhost:8080${a.coverImageUrl}" alt="${a.title}" />`
                  : `<div class="card-no-img">📰</div>`}
                <div class="card-body">
                  <div class="card-category">${a.categoryName}</div>
                  <div class="card-title">${a.title}</div>
                  <div class="card-summary">${a.summary || ''}</div>
                  <div class="card-meta">${formatDate(a.publishedAt)} · 👁 ${a.viewCount}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        container.appendChild(section);
      } catch (e) {}
    }
  }

  document.getElementById('newsletter-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertEl = document.getElementById('newsletter-alert');
    const email = document.getElementById('newsletter-email').value.trim();
    try {
      await subscribeNewsletter(email);
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Đăng ký thành công! Cảm ơn bạn.';
      alertEl.style.display = 'block';
      document.getElementById('newsletter-form').reset();
    } catch (err) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = err.message;
      alertEl.style.display = 'block';
    }
  });

  loadCategories().then(cats => {
    loadHeroAndArticles();
    loadCategorySections(cats);
  });
</script>

</body>
</html>
