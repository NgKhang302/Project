<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Quản lý Category</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav>
  <a class="logo" href="../index.html">SongNhip24</a>
  <div class="nav-links">
    <a href="../index.html">Xem trang chủ</a>
    <a href="#" id="logout-btn">Đăng xuất</a>
  </div>
</nav>

<div class="admin-layout">
  <aside class="sidebar">
    <a href="index.html">📄 Bài viết</a>
    <a href="categories.html" class="active">🗂 Category</a>
    <a href="tags.html">🏷 Tags</a>
    <a href="form.html">✏️ Tạo bài mới</a>
  </aside>

  <main class="admin-content">
    <div class="top-bar">
      <h2>Quản lý Category</h2>
    </div>

    <div id="alert" style="display:none"></div>

    <!-- Form tạo category -->
    <div class="admin-form" style="margin-bottom:24px">
      <h2 style="font-size:1rem;margin-bottom:16px">Thêm category mới</h2>
      <form id="cat-form">
        <div class="form-row">
          <div class="form-group">
            <label>Tên *</label>
            <input type="text" id="cat-name" placeholder="Công nghệ" required />
          </div>
          <div class="form-group">
            <label>Slug *</label>
            <input type="text" id="cat-slug" placeholder="cong-nghe" required />
          </div>
        </div>
        <div class="form-group">
          <label>Mô tả</label>
          <input type="text" id="cat-desc" placeholder="Mô tả ngắn..." />
        </div>
        <button type="submit" class="btn btn-primary">Thêm</button>
      </form>
    </div>

    <!-- Danh sách -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tên</th>
            <th>Slug</th>
            <th>Mô tả</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="cat-list">
          <tr><td colspan="5" class="loading">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script>
  document.getElementById('logout-btn').addEventListener('click', (e) => {
    e.preventDefault();
    logout();
  });

  // Tự gen slug từ tên
  document.getElementById('cat-name').addEventListener('input', function () {
    document.getElementById('cat-slug').value = this.value
      .toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/đ/g, 'd')
      .replace(/[^a-z0-9\s-]/g, '')
      .trim().replace(/\s+/g, '-');
  });

  const alertEl = document.getElementById('alert');

  function showAlert(type, msg) {
    alertEl.className = 'alert alert-' + type;
    alertEl.textContent = msg;
    alertEl.style.display = 'block';
  }

  async function loadCategories() {
    const tbody = document.getElementById('cat-list');
    try {
      const cats = await adminGetCategories();
      if (cats.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">Chưa có category nào.</td></tr>';
        return;
      }
      tbody.innerHTML = cats.map(c => `
        <tr>
          <td>${c.id}</td>
          <td><strong>${c.name}</strong></td>
          <td>${c.slug}</td>
          <td>${c.description || ''}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id}, '${c.name}')">Xoá</button>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      showAlert('error', 'Lỗi tải danh sách');
    }
  }

  document.getElementById('cat-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await adminCreateCategory({
        name: document.getElementById('cat-name').value.trim(),
        slug: document.getElementById('cat-slug').value.trim(),
        description: document.getElementById('cat-desc').value.trim()
      });
      document.getElementById('cat-form').reset();
      showAlert('success', 'Đã thêm category!');
      loadCategories();
    } catch (err) {
      showAlert('error', err.message);
    }
  });

  async function deleteCategory(id, name) {
    if (!confirm(`Xoá category "${name}"?`)) return;
    try {
      await adminDeleteCategory(id);
      loadCategories();
    } catch (e) {
      showAlert('error', 'Xoá thất bại: ' + e.message);
    }
  }

  requireAuth().then(loadCategories);
</script>

</body>
</html>
