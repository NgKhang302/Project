<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Quản lý bài viết</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<nav>
  <a class="logo" href="../index.html">SongNhip24</a>
  <div class="nav-links">
    <a href="../index.html">Xem trang chủ</a>
    <a href="#" id="logout-btn">Đăng xuất</a>
  </div>
</nav>

<div class="admin-layout">
  <aside class="sidebar">
    <a href="index.html" class="active">📄 Bài viết</a>
    <a href="categories.html">🗂 Category</a>
    <a href="form.html">✏️ Tạo bài mới</a>
  </aside>

  <main class="admin-content">
    <div class="top-bar">
      <h2>Quản lý bài viết</h2>
      <a href="form.html" class="btn btn-primary">+ Tạo bài mới</a>
    </div>

    <div id="alert" style="display:none"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Tiêu đề</th>
            <th>Category</th>
            <th>Trạng thái</th>
            <th>Ngày tạo</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody id="article-list">
          <tr><td colspan="6" class="loading">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script src="../js/api.js"></script>
<script>
  requireAuth();

  document.getElementById('logout-btn').addEventListener('click', (e) => {
    e.preventDefault();
    localStorage.removeItem('token');
    window.location.href = '../login.html';
  });

  async function loadArticles() {
    const tbody = document.getElementById('article-list');
    const alertEl = document.getElementById('alert');
    try {
      const articles = await adminGetArticles();
      if (articles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">Chưa có bài viết nào.</td></tr>';
        return;
      }
      tbody.innerHTML = articles.map(a => `
        <tr>
          <td>${a.id}</td>
          <td><strong>${a.title}</strong></td>
          <td>${a.categoryName}</td>
          <td><span class="badge badge-${a.status.toLowerCase()}">${a.status}</span></td>
          <td>${formatDate(a.createdAt)}</td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <a href="form.html?id=${a.id}" class="btn btn-warning btn-sm">Sửa</a>
            ${a.status === 'DRAFT'
              ? `<button class="btn btn-success btn-sm" onclick="publish(${a.id})">Publish</button>`
              : `<button class="btn btn-secondary btn-sm" onclick="unpublish(${a.id})">Draft</button>`}
            <button class="btn btn-danger btn-sm" onclick="deleteArticle(${a.id})">Xoá</button>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = 'Lỗi tải danh sách: ' + e.message;
      alertEl.style.display = 'block';
    }
  }

  async function publish(id) {
    if (!confirm('Publish bài này?')) return;
    try {
      await adminPublish(id);
      loadArticles();
    } catch (e) { alert(e.message); }
  }

  async function unpublish(id) {
    if (!confirm('Đưa về Draft?')) return;
    try {
      await adminUnpublish(id);
      loadArticles();
    } catch (e) { alert(e.message); }
  }

  async function deleteArticle(id) {
    if (!confirm('Xoá bài viết này?')) return;
    try {
      await adminDeleteArticle(id);
      loadArticles();
    } catch (e) { alert(e.message); }
  }

  loadArticles();
</script>

</body>
</html>
