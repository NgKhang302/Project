# Server
server.port=${SERVER_PORT:8080}

# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eduapp}
spring.datasource.username=${DB_USERNAME:eduapp}
spring.datasource.password=${DB_PASSWORD:eduapp}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:change-this-secret-in-production-please-make-it-long-and-random-32bytes+}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.cookie-name=${JWT_COOKIE_NAME:eduapp_token}

# Cookie: set COOKIE_SECURE=true once served over real HTTPS in production.
# Must stay false for plain-HTTP local/LAN access (browsers drop Secure cookies over HTTP).
app.cookie.secure=${COOKIE_SECURE:false}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# File upload
app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Grammar checking (self-hosted LanguageTool)
app.languagetool.url=${LANGUAGETOOL_URL:http://localhost:8010/v2/check}
app.languagetool.timeout-ms=${LANGUAGETOOL_TIMEOUT_MS:8000}
