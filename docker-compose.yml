services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-eduapp}
      POSTGRES_USER: ${DB_USERNAME:-eduapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eduapp}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eduapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-eduapp}
      DB_USERNAME: ${DB_USERNAME:-eduapp}
      DB_PASSWORD: ${DB_PASSWORD:-eduapp}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-please-make-it-long-and-random-32bytes+}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_COOKIE_NAME: ${JWT_COOKIE_NAME:-eduapp_token}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      UPLOAD_DIR: /app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
